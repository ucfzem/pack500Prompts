<head>

<title>Pack 500 Prompts IA Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-heading: 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Outfit', system-ui, -apple-system, sans-serif;
  --font-arabic: 'Noto Naskh Arabic', serif;
  --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
}

[data-theme="dark"] {
  --bg: #120c0a;
  --bg-secondary: #1a1410;
  --bg-card: #231c16;
  --bg-card-hover: #2d241d;
  --text: #f5f0e8;
  --text-secondary: #c4b89e;
  --text-muted: #8a7e6b;
  --gold: #c9a84c;
  --gold-light: #e0c872;
  --gold-dark: #a07828;
  --gold-glow: rgba(201, 168, 76, 0.12);
  --border: #3a3228;
  --border-light: #4a4035;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.4);
  --gradient-gold: linear-gradient(135deg, #c9a84c, #e0c872);
  --gradient-card: linear-gradient(180deg, #231c16 0%, #1e1814 100%);
  --tag-bg: rgba(201, 168, 76, 0.15);
  --tag-text: #d4b96a;
  --separator: rgba(201, 168, 76, 0.2);
  --nav-bg: rgba(18, 12, 10, 0.92);
  --code-bg: #1e1a14;
}

[data-theme="light"] {
  --bg: #f5f0e8;
  --bg-secondary: #faf7f0;
  --bg-card: #ffffff;
  --bg-card-hover: #f8f3e8;
  --text: #2a231c;
  --text-secondary: #5c4e3a;
  --text-muted: #8a7e6b;
  --gold: #a07828;
  --gold-light: #c9a84c;
  --gold-dark: #6b4e1a;
  --gold-glow: rgba(160, 120, 40, 0.1);
  --border: #e0d5c0;
  --border-light: #ede3d0;
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.04);
  --gradient-gold: linear-gradient(135deg, #8b6f47, #c9a84c);
  --gradient-card: linear-gradient(180deg, #ffffff 0%, #faf7f0 100%);
  --tag-bg: rgba(160, 120, 40, 0.12);
  --tag-text: #6b4e1a;
  --separator: rgba(160, 120, 40, 0.2);
  --nav-bg: rgba(245, 240, 232, 0.95);
  --code-bg: #f8f3e8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--border) var(--bg-secondary);
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

/* Navigation */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background var(--transition), border-color var(--transition);
}

.nav-brand {
  font-family: var(--font-heading);
  font-size: 1.15rem;
  font-weight: 700;
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

.nav-controls {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.lang-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 500;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.lang-btn:hover { border-color: var(--gold); color: var(--gold); }
.lang-btn.active {
  background: var(--gold);
  color: #1a1410;
  border-color: var(--gold);
}

.theme-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all var(--transition);
  line-height: 1;
}
.theme-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Hero */
.hero {
  padding: 7rem 2rem 3rem;
  text-align: center;
  max-width: 800px;
  margin: 0 auto;
}

.hero h1 {
  font-family: var(--font-heading);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
  line-height: 1.2;
}

.hero p {
  color: var(--text-secondary);
  font-size: 1.1rem;
  margin-bottom: 2rem;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 2.5rem;
}

.stat-item {
  text-align: center;
}

.stat-number {
  font-family: var(--font-heading);
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold);
  display: block;
}

.stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Separator */
.separator {
  width: 60px;
  height: 2px;
  background: var(--gradient-gold);
  margin: 2rem auto;
  border-radius: 1px;
}

/* Pillar Tabs */
.pillar-tabs {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  padding: 0 2rem 1.5rem;
  flex-wrap: wrap;
}

.pillar-tab {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 0.7rem 1.5rem;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  font-family: var(--font-body);
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.pillar-tab:hover { border-color: var(--gold); color: var(--gold); }
.pillar-tab.active {
  background: var(--tag-bg);
  border-color: var(--gold);
  color: var(--gold);
}

/* Search */
.search-wrap {
  max-width: 640px;
  margin: 0 auto 1.5rem;
  padding: 0 2rem;
}

.search-input {
  width: 100%;
  padding: 0.9rem 1.2rem;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.95rem;
  font-family: var(--font-body);
  outline: none;
  transition: all var(--transition);
}
.search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
.search-input::placeholder { color: var(--text-muted); }

/* Category filter */
.cat-filters {
  display: flex;
  justify-content: center;
  gap: 0.4rem;
  padding: 0 2rem 2rem;
  flex-wrap: wrap;
}

.cat-filter {
  background: none;
  border: 1px solid transparent;
  color: var(--text-muted);
  padding: 0.35rem 0.9rem;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.cat-filter:hover { color: var(--text-secondary); border-color: var(--border); }
.cat-filter.active {
  background: var(--tag-bg);
  color: var(--gold);
  border-color: var(--gold);
}

/* Prompts Grid */
.prompts-section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
}

.prompts-grid {
  display: grid;
  gap: 0.75rem;
}

/* Prompt Card */
.prompt-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.2rem 1.5rem;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.prompt-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); }

.prompt-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}

.prompt-number {
  font-family: var(--font-heading);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--gold);
  white-space: nowrap;
  margin-top: 0.1rem;
}

.prompt-title {
  font-family: var(--font-heading);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}

.prompt-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
  opacity: 0;
  margin-top: 0;
}
.prompt-card.expanded .prompt-body {
  max-height: 600px;
  opacity: 1;
  margin-top: 0.8rem;
}

.prompt-text {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.7;
  padding: 0.8rem 1rem;
  background: var(--code-bg);
  border-radius: 8px;
  border: 1px solid var(--border);
  position: relative;
}

.copy-btn {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.3rem 0.7rem;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.copy-btn:hover { border-color: var(--gold); color: var(--gold); }
.copy-btn.copied { background: var(--tag-bg); color: var(--gold); border-color: var(--gold); }

.prompt-expand-icon {
  color: var(--text-muted);
  font-size: 0.7rem;
  transition: transform var(--transition);
  margin-left: 0.5rem;
}
.prompt-card.expanded .prompt-expand-icon {
  transform: rotate(180deg);
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
}

/* Arabic RTL */
[lang="ar"] {
  direction: rtl;
  font-family: var(--font-arabic), var(--font-body);
}
[lang="ar"] .nav-brand,
[lang="ar"] h1,
[lang="ar"] .prompt-title {
  font-family: var(--font-arabic), var(--font-heading);
}

/* Responsive */
@media (max-width: 768px) {
  .nav { padding: 0 1rem; height: 60px; }
  .nav-brand { font-size: 1rem; }
  .hero { padding: 5.5rem 1rem 2rem; }
  .stats { gap: 1.5rem; }
  .pillar-tabs { gap: 0.4rem; padding: 0 1rem 1rem; }
  .pillar-tab { padding: 0.5rem 1rem; font-size: 0.8rem; }
  .search-wrap { padding: 0 1rem; }
  .cat-filters { padding: 0 1rem 1.5rem; }
  .prompts-section { padding: 0 1rem 3rem; }
  .prompt-card { padding: 1rem 1.2rem; }
  .prompt-title { font-size: 0.9rem; }
}

@media (max-width: 480px) {
  .pillar-tab { font-size: 0.75rem; padding: 0.4rem 0.8rem; }
  .lang-btn { font-size: 0.7rem; padding: 0.2rem 0.4rem; }
  .stats { gap: 1rem; }
  .stat-number { font-size: 1.5rem; }
}
</style>
</head>

développement personnel. Toutes les sections : pré-tête, headline, histoire, preuves, offre, etc.","en":"","sp":"","ar":""}},{"n":312,"t":{"fr":"Page de capture pour un webinar","en":"","sp":"","ar":""},"p":{"fr":"Contenu d'une page d'inscription à un webinaire gratuit sur [sujet]. Titre, promesse, date/heure, court paragraphe sur l'animateur, formulaire. Urgence 'Places limitées'.","en":"","sp":"","ar":""}},{"n":313,"t":{"fr":"Page de vente pour un produit physique avec cross-selling","en":"","sp":"","ar":""},"p":{"fr":"Page produit pour [produit physique] sur Shopify. Description bénéfices, spécifications, avis clients, section 'Fréquemment achetés ensemble' à prix réduit.","en":"","sp":"","ar":""}},{"n":314,"t":{"fr":"Page 'Qui suis-je' transformée en page de vente douce","en":"","sp":"","ar":""},"p":{"fr":"Page 'À propos' se lisant comme une lettre personnelle mais orientant subtilement vers les services de [consultant]. Valeurs, mission, comment tu peux aider. Formulaire contact.","en":"","sp":"","ar":""}},{"n":315,"t":{"fr":"Trame pour une page de vente avec vidéo de vente (VSL)","en":"","sp":"","ar":""},"p":{"fr":"Script d'une VSL de 5 minutes et la landing page autour. Player vidéo en haut, résumé des points, témoignages, bouton d'achat sous la vidéo.","en":"","sp":"","ar":""}},{"n":316,"t":{"fr":"Page d'atterrissage pour un lead magnet payant (Tripwire)","en":"","sp":"","ar":""},"p":{"fr":"Page de vente d'un produit d'appel (tripwire) à [prix bas] après téléchargement d'un lead magnet gratuit. Valeur exceptionnelle, offre unique, garantie.","en":"","sp":"","ar":""}},{"n":317,"t":{"fr":"Page de vente avec calculateur de ROI","en":"","sp":"","ar":""},"p":{"fr":"Intègre un calculateur de ROI dans la page de vente de [service B2B]. Texte d'accompagnement : 'Découvrez combien vous pouvez économiser'. Inputs et promesse.","en":"","sp":"","ar":""}},{"n":318,"t":{"fr":"Page de vente minimaliste pour un produit unique","en":"","sp":"","ar":""},"p":{"fr":"Page de vente épurée type 'One Product Store'. Hero shot du produit, un seul titre puissant, 3 bénéfices, bouton d'achat, section témoignages. Pas de navigation.","en":"","sp":"","ar":""}},{"n":319,"t":{"fr":"Offre de lancement avec compte à rebours","en":"","sp":"","ar":""},"p":{"fr":"Bloc d'urgence pour une page de vente : 'L'offre se termine dans [timer]'. Texte sur les bonus offerts uniquement pendant le lancement, hausse de prix après.","en":"","sp":"","ar":""}},{"n":320,"t":{"fr":"Page de vente avec comparaison de forfaits","en":"","sp":"","ar":""},"p":{"fr":"Tableau comparatif de 3 forfaits pour [service] : Basic, Pro, Premium. Fonctionnalités, prix, forfait recommandé mis en évidence. CTA distinct par forfait.","en":"","sp":"","ar":""}},{"n":321,"t":{"fr":"Page de vente de type 'Squeeze Page'","en":"","sp":"","ar":""},"p":{"fr":"Texte d'une squeeze page agressive dont le seul but est de capturer l'email. Headline promettant un cadeau, pas de menu ni liens sortants, formulaire et bouton.","en":"","sp":"","ar":""}},{"n":322,"t":{"fr":"Vente additionnelle (upsell) après panier","en":"","sp":"","ar":""},"p":{"fr":"Copy pour une page d'upsell (order bump) affichée après l'ajout au panier. Produit principal : [produit]. Upsell : [complément]. Réduction exclusive.","en":"","sp":"","ar":""}},{"n":323,"t":{"fr":"Page de vente pour un événement en présentiel","en":"","sp":"","ar":""},"p":{"fr":"Page de vente pour une conférence/mastermind. Thème, date, lieu, intervenants (photos décrites), programme, témoignages des éditions précédentes, early bird.","en":"","sp":"","ar":""}},{"n":324,"t":{"fr":"Page 'Devenir affilié'","en":"","sp":"","ar":""},"p":{"fr":"Page de vente pour recruter des affiliés pour ton produit. Produit, taux de commission, ressources fournies, processus d'inscription. Pourquoi c'est facile à vendre.","en":"","sp":"","ar":""}},{"n":325,"t":{"fr":"Page de remerciement après achat (upsell 2)","en":"","sp":"","ar":""},"p":{"fr":"Page de remerciement confirmant la commande ET proposant une offre spéciale de upsell en one-click. Message de remerciement et pitch de l'offre additionnelle.","en":"","sp":"","ar":""}},{"n":326,"t":{"fr":"Page de vente avec garantie 'Satisfait ou Remboursé'","en":"","sp":"","ar":""},"p":{"fr":"Certificat de garantie 100% satisfait ou remboursé pendant [durée]. Texte engageant levant le risque. Procédure simple de remboursement.","en":"","sp":"","ar":""}},{"n":327,"t":{"fr":"Page de vente pour une formation avec programme détaillé","en":"","sp":"","ar":""},"p":{"fr":"Pour la formation [nom], décris chaque module avec un titre vendeur et 3 points clés. Table des matières. Section bonus pour faire monter la valeur perçue.","en":"","sp":"","ar":""}},{"n":328,"t":{"fr":"Témoignages vidéo décrits pour page de vente","en":"","sp":"","ar":""},"p":{"fr":"Section 'Ils ont testé et approuvé' avec 3 témoignages fictifs mais crédibles, citations avec photos décrites et résultats chiffrés. Adapte au produit [produit].","en":"","sp":"","ar":""}},{"n":329,"t":{"fr":"Appel à l'action (CTA) pour différentes étapes du tunnel","en":"","sp":"","ar":""},"p":{"fr":"7 variantes de bouton CTA pour un tunnel de vente : 'Je veux ma place', 'Oui, envoyez-moi le guide', 'Ajouter au panier', etc. Contexte d'utilisation.","en":"","sp":"","ar":""}},{"n":330,"t":{"fr":"Storytelling de marque pour une page 'Notre histoire'","en":"","sp":"","ar":""},"p":{"fr":"Page 'Notre histoire' émouvante pour [marque] se terminant par un appel à rejoindre l'aventure (acheter). Utilise l'archétype de marque [ex: l'Explorateur].","en":"","sp":"","ar":""}},{"n":331,"t":{"fr":"Page de vente pour un service 'Done For You'","en":"","sp":"","ar":""},"p":{"fr":"Page de vente pour un service clé en main : 'Nous faisons [tâche] à votre place'. Points de douleur, pourquoi le faire soi-même est une erreur, processus, CTA appel.","en":"","sp":"","ar":""}},{"n":332,"t":{"fr":"Page de vente d'un template/kit numérique","en":"","sp":"","ar":""},"p":{"fr":"Vends un template [type, ex: Notion] sur une page. Captures d'écran décrites, fonctionnalités, bénéfices d'organisation, aperçu vidéo. Prix et achat immédiat.","en":"","sp":"","ar":""}},{"n":333,"t":{"fr":"Landing page post-clic pour une campagne Google Ads","en":"","sp":"","ar":""},"p":{"fr":"Page d'atterrissage ultra-ciblée pour le mot-clé [mot-clé] et l'annonce [texte]. Message parfaitement aligné. Éléments de confiance, un seul CTA, formulaire court.","en":"","sp":"","ar":""}},{"n":334,"t":{"fr":"Page de vente éphémère pour un produit saisonnier","en":"","sp":"","ar":""},"p":{"fr":"Page de vente avec un design évoquant [saison], par exemple Noël. Titre festif, section 'Pourquoi c'est le cadeau parfait', livraison garantie avant [date].","en":"","sp":"","ar":""}},{"n":335,"t":{"fr":"Page de vente d'un abonnement récurrent","en":"","sp":"","ar":""},"p":{"fr":"Vends un abonnement mensuel à [service]. Valeur continue, nouveaux contenus chaque mois, flexibilité de résiliation, comparaison coût annuel vs mensuel.","en":"","sp":"","ar":""}},{"n":336,"t":{"fr":"Checkout page optimisée avec réassurance","en":"","sp":"","ar":""},"p":{"fr":"Éléments de réassurance à placer à côté du formulaire de paiement : icônes de sécurité, témoignage court, garantie, rappel des bénéfices, FAQ de dernière minute.","en":"","sp":"","ar":""}},{"n":337,"t":{"fr":"Page de vente type 'Livre blanc' B2B","en":"","sp":"","ar":""},"p":{"fr":"Landing page pour télécharger un livre blanc sur [sujet technique]. Expertise de l'entreprise, sujets couverts, données exclusives. Formulaire (nom, email, entreprise).","en":"","sp":"","ar":""}},{"n":338,"t":{"fr":"Page de vente de formation en ligne avec accès vie","en":"","sp":"","ar":""},"p":{"fr":"Page pour une formation avec accès à vie. Capitalise sur la peur de manquer une mise à jour future. Programme, bonus, prix avec paiement en plusieurs fois.","en":"","sp":"","ar":""}},{"n":339,"t":{"fr":"Trame pour une page de vente vidéo uniquement","en":"","sp":"","ar":""},"p":{"fr":"Page de vente ne contenant qu'une vidéo, un titre et un bouton. La vidéo fait tout le travail de vente. Texte d'introduction autour du lecteur vidéo.","en":"","sp":"","ar":""}},{"n":340,"t":{"fr":"Page de vente d'un mastermind haut de gamme","en":"","sp":"","ar":""},"p":{"fr":"Vends un mastermind à [prix élevé] avec une page sobre. Lettre du fondateur, profil des participants recherchés, processus de candidature, témoignages.","en":"","sp":"","ar":""}},{"n":341,"t":{"fr":"Séquence d'e-mails de lancement de produit (PLF)","en":"","sp":"","ar":""},"p":{"fr":"Séquence complète de 12 emails pour un lancement selon la méthode Product Launch Formula. Répartition pré-lancement (4), lancement (5), post-lancement (3).","en":"","sp":"","ar":""}},{"n":342,"t":{"fr":"Email 1 d'abandon de panier (1 heure après)","en":"","sp":"","ar":""},"p":{"fr":"Premier email de relance panier abandonné, envoyé 1 heure après. Rappel du produit avec son image, ton léger et serviable, lien direct vers le panier.","en":"","sp":"","ar":""}},{"n":343,"t":{"fr":"Email 2 d'abandon de panier avec preuve sociale (24h)","en":"","sp":"","ar":""},"p":{"fr":"Deuxième email de relance (24h après). Témoignage client sur la qualité, section FAQ (livraison, retours). Sentiment d'urgence léger.","en":"","sp":"","ar":""}},{"n":344,"t":{"fr":"Email 3 d'abandon de panier avec offre (48h)","en":"","sp":"","ar":""},"p":{"fr":"Dernier email (48h après) offrant un code de réduction de [X]% ou la livraison gratuite. 'On aimerait vraiment que vous essayiez ce produit'. Limite durée offre.","en":"","sp":"","ar":""}},{"n":345,"t":{"fr":"Séquence d'e-mails pour un lancement surprise (Flash Launch)","en":"","sp":"","ar":""},"p":{"fr":"Séquence de 3 emails sur 24h pour un lancement éclair. 1 : annonce offre exclusive. 2 : résultats d'un bêta-testeur. 3 : dernières heures et compteur.","en":"","sp":"","ar":""}},{"n":346,"t":{"fr":"Email de panier abandonné pour un produit cher","en":"","sp":"","ar":""},"p":{"fr":"Séquence pour un produit haut de gamme. Email 1 : propose un appel téléphonique. Email 2 : étude de cas détaillée. Email 3 : plan de financement.","en":"","sp":"","ar":""}},{"n":347,"t":{"fr":"Séquence de vente pour un service de consulting","en":"","sp":"","ar":""},"p":{"fr":"5 emails pour convertir un prospect en client de consulting. 1 : cas client. 2 : article approfondi. 3 : invitation webinaire. 4 : appel découverte. 5 : dernier suivi.","en":"","sp":"","ar":""}},{"n":348,"t":{"fr":"Email de relance pour un paiement refusé","en":"","sp":"","ar":""},"p":{"fr":"Email automatique informant le client que son paiement a été refusé (carte expirée). Texte poli et aidant, lien pour mettre à jour les informations de facturation.","en":"","sp":"","ar":""}},{"n":349,"t":{"fr":"Séquence d'upsell post-achat par email","en":"","sp":"","ar":""},"p":{"fr":"3 emails dans la semaine suivant un achat pour proposer des produits complémentaires. 1 : remerciement + guide. 2 : produit complémentaire. 3 : pack avec réduction.","en":"","sp":"","ar":""}},{"n":350,"t":{"fr":"Email pour un lancement avec une liste de prévenus (waitlist)","en":"","sp":"","ar":""},"p":{"fr":"Email pour les personnes sur la liste d'attente, annonçant que les portes sont ouvertes et qu'ils ont un accès anticipé. Lien avec code spécial. Excitation.","en":"","sp":"","ar":""}},{"n":351,"t":{"fr":"Séquence de réactivation pour panier abandonné depuis 7 jours","en":"","sp":"","ar":""},"p":{"fr":"Relance plus agressive après 7 jours. Rappelle ce qu'ils perdent, ajoute preuve sociale ('Rejoignez les X clients'), lien direct vers le paiement.","en":"","sp":"","ar":""}},{"n":352,"t":{"fr":"Email de lancement 'Les portes se ferment'","en":"","sp":"","ar":""},"p":{"fr":"Dernier email d'une séquence de lancement, annonçant la fermeture imminente des inscriptions. Ton d'urgence, compte à rebours, peur de manquer le bonus.","en":"","sp":"","ar":""}},{"n":353,"t":{"fr":"Séquence de bienvenue orientée vente pour un lead magnet","en":"","sp":"","ar":""},"p":{"fr":"Mini-séquence de vente d'un produit d'appel. Email 1 : livraison du lead magnet. Email 2 : histoire + problème. Email 3 : tripwire offer (offre spéciale).","en":"","sp":"","ar":""}},{"n":354,"t":{"fr":"Email de lancement 'La méthode derrière le produit'","en":"","sp":"","ar":""},"p":{"fr":"Email storytelling pour une séquence de lancement expliquant la genèse et la méthode unique derrière le produit. Montre l'expertise et la recherche.","en":"","sp":"","ar":""}},{"n":355,"t":{"fr":"Relance panier abandonné via SMS (texte)","en":"","sp":"","ar":""},"p":{"fr":"Contenu d'un SMS de relance panier abandonné. Court, avec le nom du produit, un lien court, et un sentiment d'urgence discret.","en":"","sp":"","ar":""}},{"n":356,"t":{"fr":"Email de lancement 'Pourquoi ce produit est différent'","en":"","sp":"","ar":""},"p":{"fr":"Email qui différencie clairement le produit de la concurrence. 3 arguments percutants. Détruit les croyances limitantes du marché.","en":"","sp":"","ar":""}},{"n":357,"t":{"fr":"Séquence pour vendre une formation sans faire de webinaire","en":"","sp":"","ar":""},"p":{"fr":"Séquence email de 7 jours 'Automated Webinar' : chaque jour un email délivre du contenu de valeur, répond à une objection, et rapproche de la vente le jour 7.","en":"","sp":"","ar":""}},{"n":358,"t":{"fr":"Email pour récupérer les prospects ayant cliqué mais pas acheté","en":"","sp":"","ar":""},"p":{"fr":"Cible les personnes ayant cliqué sur le lien de vente plusieurs fois sans acheter. Email : 'Je vois que vous êtes intéressé... qu'est-ce qui vous retient ?'","en":"","sp":"","ar":""}},{"n":359,"t":{"fr":"Séquence de lancement pour un produit SaaS","en":"","sp":"","ar":""},"p":{"fr":"Séquence de 5 emails pour le lancement d'une nouvelle fonctionnalité payante. Montre la valeur, le problème résolu, un aperçu, et une offre de mise à niveau.","en":"","sp":"","ar":""}},{"n":360,"t":{"fr":"Email pour annoncer une augmentation de prix prochaine","en":"","sp":"","ar":""},"p":{"fr":"Email prévenant d'une hausse de prix dans 48h. Justifie-la (améliorations, inflation) et invite à verrouiller l'ancien prix en achetant maintenant.","en":"","sp":"","ar":""}},{"n":361,"t":{"fr":"Relance de panier abandonné avec vidéo personnalisée","en":"","sp":"","ar":""},"p":{"fr":"Texte de l'email introduisant une mini-vidéo personnalisée : 'Je vous ai préparé un petit message'. Humanise la relance.","en":"","sp":"","ar":""}},{"n":362,"t":{"fr":"Email du fondateur expliquant pourquoi il a créé ce produit","en":"","sp":"","ar":""},"p":{"fr":"Email intime où le fondateur raconte une histoire personnelle qui l'a conduit à créer le produit. Connecte émotionnellement avant l'offre.","en":"","sp":"","ar":""}},{"n":363,"t":{"fr":"Séquence de nurturing pour préparer un lancement (Seed)","en":"","sp":"","ar":""},"p":{"fr":"4 emails de contenu pur, sans vente, pour nourrir la liste avant un lancement. Thèmes : éducation, inspiration, données, mythes. Teasers du lancement.","en":"","sp":"","ar":""}},{"n":364,"t":{"fr":"Email de panier abandonné pour un produit digital","en":"","sp":"","ar":""},"p":{"fr":"Email soulignant l'accès instantané et les résultats rapides. Aborde la peur de passer à l'action. Témoignage d'un client ayant eu peur au début.","en":"","sp":"","ar":""}},{"n":365,"t":{"fr":"Séquence de vente croisée pour les clients existants","en":"","sp":"","ar":""},"p":{"fr":"3 emails pour vendre une nouvelle formation à tes anciens élèves. Confiance établie : 'Tu as déjà fait X, voici la prochaine étape Y'. Offre de fidélité.","en":"","sp":"","ar":""}},{"n":366,"t":{"fr":"Relance de devis / proposition commerciale","en":"","sp":"","ar":""},"p":{"fr":"Email pour relancer un prospect à qui tu as envoyé un devis. Modèle 1 : suivi poli. Modèle 2 : ajout de valeur. Modèle 3 : rupture de contact.","en":"","sp":"","ar":""}},{"n":367,"t":{"fr":"Email 'Cassage d'objection' dans une séquence","en":"","sp":"","ar":""},"p":{"fr":"Identifie l'objection numéro 1 ('Trop cher', 'Pas le temps') et rédige un email entier qui la pulvérise avec logique, témoignages et calcul de ROI.","en":"","sp":"","ar":""}},{"n":368,"t":{"fr":"Séquence de vente pour un événement live payant","en":"","sp":"","ar":""},"p":{"fr":"Emails pour vendre des billets pour une conférence. Annonce, early bird, speaker reveal, atterrissage de dernière minute, et 'voir sur place'.","en":"","sp":"","ar":""}},{"n":369,"t":{"fr":"Email de bienvenue avec un 'cadeau' non dévoilé","en":"","sp":"","ar":""},"p":{"fr":"Premier email après inscription : offre un bonus surprise non annoncé sur la page de capture. Effet de surprise agréable qui renforce la confiance.","en":"","sp":"","ar":""}},{"n":370,"t":{"fr":"Campagne d'e-mailing pour écouler un stock","en":"","sp":"","ar":""},"p":{"fr":"Série de 3 emails pour liquidation de stock. Urgence 'Jusqu'à épuisement des stocks', remises progressives (Jour 1: -30%, Jour 2: -50%).","en":"","sp":"","ar":""}},{"n":371,"t":{"fr":"Email suite à un essai gratuit qui expire bientôt","en":"","sp":"","ar":""},"p":{"fr":"Alerte 3 jours avant la fin d'un essai gratuit pour un SaaS. Rappelle les bénéfices utilisés, les fonctionnalités premium qu'ils vont perdre, lien direct.","en":"","sp":"","ar":""}},{"n":372,"t":{"fr":"Séquence de vente de produit d'affiliation par email","en":"","sp":"","ar":""},"p":{"fr":"5 emails pour promouvoir un produit affilié. Chaque email apporte une valeur unique : test produit, comparaison, bonus offert par toi, FAQ, dernière chance.","en":"","sp":"","ar":""}},{"n":373,"t":{"fr":"Email de relance après panier abandonné avec un bonus","en":"","sp":"","ar":""},"p":{"fr":"Ajoute un bonus exclusif (PDF, checklist) offert uniquement s'ils finalisent leur commande dans les 24h. Met en avant la valeur du bonus.","en":"","sp":"","ar":""}},{"n":374,"t":{"fr":"Séquence pour vendre un coaching de groupe","en":"","sp":"","ar":""},"p":{"fr":"Emails présentant le programme, les résultats des anciens, un appel découverte, et une offre limitée à [nombre] places.","en":"","sp":"","ar":""}},{"n":375,"t":{"fr":"Email pour un lancement avec un tirage au sort","en":"","sp":"","ar":""},"p":{"fr":"Encourage l'achat en offrant une chance de gagner un prix supplémentaire (consulting, produit) pour tout achat avant une certaine date.","en":"","sp":"","ar":""}},{"n":376,"t":{"fr":"Relance d'abandon de formulaire de paiement","en":"","sp":"","ar":""},"p":{"fr":"Email pour ceux ayant commencé à remplir le formulaire de paiement sans valider. 'Votre commande est en attente, un problème avec le paiement ?' Proposer de l'aide.","en":"","sp":"","ar":""}},{"n":377,"t":{"fr":"Séquence de vente pour un produit très cher (high-ticket)","en":"","sp":"","ar":""},"p":{"fr":"Approche plus consultative : emails invitant à un appel stratégique, études de cas, vidéos de présentation, proposition personnalisée. Moins d'urgence, plus de relation.","en":"","sp":"","ar":""}},{"n":378,"t":{"fr":"Email 'Dernière chance' pour un produit en édition limitée","en":"","sp":"","ar":""},"p":{"fr":"Annonce qu'il ne reste que X exemplaires (ou que l'offre se termine). Compteur, photos des stocks, liste des avantages. Urgence réelle.","en":"","sp":"","ar":""}},{"n":379,"t":{"fr":"Séquence de remerciement après un lancement","en":"","sp":"","ar":""},"p":{"fr":"3 emails après la fin du lancement. Remerciements, instructions pour commencer, création d'une communauté (groupe privé), et demande de feedback.","en":"","sp":"","ar":""}},{"n":380,"t":{"fr":"Email d'excuse pour un problème lors du paiement","en":"","sp":"","ar":""},"p":{"fr":"Si un bug a empêché l'achat, écris un email d'excuse avec une offre exclusive pour se faire pardonner. Rassure sur le fait que tout est réglé.","en":"","sp":"","ar":""}},{"n":381,"t":{"fr":"Fiche produit Amazon optimisée SEO avec bullet points","en":"","sp":"","ar":""},"p":{"fr":"Rédige le titre (max 200 car.), les 5 bullet points (chacun axé sur un bénéfice), et la description produit HTML pour [produit] sur Amazon. Mots-clés '[mot-clé1]', '[mot-clé2]'.","en":"","sp":"","ar":""}},{"n":382,"t":{"fr":"Description produit Shopify pour une marque de vêtements","en":"","sp":"","ar":""},"p":{"fr":"Description de produit pour la boutique Shopify de [marque] pour l'article [article]. Style : storytelling autour de l'inspiration, matières, conseils de taille, lookbook.","en":"","sp":"","ar":""}},{"n":383,"t":{"fr":"Fiche produit Etsy avec SEO longue traîne","en":"","sp":"","ar":""},"p":{"fr":"Annonce Etsy complète pour un produit fait main [produit]. Titre avec mots-clés longue traîne, description détaillée avec inspiration, dimensions, délai, politiques, 13 tags.","en":"","sp":"","ar":""}},{"n":384,"t":{"fr":"Description de produit pour un site de dropshipping","en":"","sp":"","ar":""},"p":{"fr":"Description engageante pour un produit [produit] en dropshipping. Copywriting émotionnel pour créer le désir. Section 'Caractéristiques' et 'Bénéfices'. Badge 'Livraison offerte'.","en":"","sp":"","ar":""}},{"n":385,"t":{"fr":"Optimisation d'une fiche produit existante (audit)","en":"","sp":"","ar":""},"p":{"fr":"Audite la fiche produit [texte] et propose une version améliorée. Renforce les bénéfices, ajoute de la preuve sociale, corrige le SEO title et meta description.","en":"","sp":"","ar":""}},{"n":386,"t":{"fr":"Description de produit pour un complément alimentaire","en":"","sp":"","ar":""},"p":{"fr":"Fiche produit pour [complément] en respectant les règles de conformité. Ingrédients, bienfaits prouvés, dosage, certifications. Avertissement et conseil d'utilisation.","en":"","sp":"","ar":""}},{"n":387,"t":{"fr":"Fiche produit pour un logiciel / SaaS (marketplace)","en":"","sp":"","ar":""},"p":{"fr":"Page produit pour la place de marché [ex: AppSumo]. Titre, sous-titre, description du problème résolu, fonctionnalités, cas d'usage, témoignages, offre spéciale avec prix.","en":"","sp":"","ar":""}},{"n":388,"t":{"fr":"Title et méta-description pour une collection Shopify","en":"","sp":"","ar":""},"p":{"fr":"Titre SEO et méta-description pour une page collection 'Robes d'été' sur Shopify. Cible '[mots-clés]', donne envie de cliquer. Max 60 car. titre, 160 car. méta.","en":"","sp":"","ar":""}},{"n":389,"t":{"fr":"Description de produit B2B avec fiche technique","en":"","sp":"","ar":""},"p":{"fr":"Fiche produit technique pour un acheteur professionnel. Résumé exécutif, spécifications techniques détaillées en tableau, normes, options de personnalisation, appel d'offre.","en":"","sp":"","ar":""}},{"n":390,"t":{"fr":"Fiche produit pour un bien immobilier de luxe","en":"","sp":"","ar":""},"p":{"fr":"Annonce immobilière pour une villa de luxe. Emplacement, style architectural, description pièce par pièce, prestations haut de gamme, vue. Ton exclusif.","en":"","sp":"","ar":""}},{"n":391,"t":{"fr":"Description de produit éco-responsable et durable","en":"","sp":"","ar":""},"p":{"fr":"Met l'accent sur la durabilité, les matériaux éco-responsables, et l'impact social/écologique pour le produit [produit]. Histoire de l'artisan ou fabrication éthique.","en":"","sp":"","ar":""}},{"n":392,"t":{"fr":"Contenu pour une boîte d'abonnement (box)","en":"","sp":"","ar":""},"p":{"fr":"Décris le concept de la box mensuelle [nom] : la surprise, la thématique du mois, la valeur totale des produits, les avantages de l'abonnement. Unboxing virtuel.","en":"","sp":"","ar":""}},{"n":393,"t":{"fr":"Fiche produit avec vidéo 360° (script et texte)","en":"","sp":"","ar":""},"p":{"fr":"Texte descriptif accompagnant une vue 360° du produit. Guide l'utilisateur sur ce qu'il voit, pointe les détails clés, suggère l'interaction.","en":"","sp":"","ar":""}},{"n":394,"t":{"fr":"Description pour un pack ou bundle de produits","en":"","sp":"","ar":""},"p":{"fr":"Vends un lot de [nombre] produits complémentaires. Synergie entre les produits, prix total vs prix du lot, pourquoi c'est le moment d'acheter le pack complet.","en":"","sp":"","ar":""}},{"n":395,"t":{"fr":"Produit personnalisable : guide de personnalisation","en":"","sp":"","ar":""},"p":{"fr":"Instructions et description d'un produit personnalisable (gravure, couleur). Processus de commande, champs à remplir, aperçus.","en":"","sp":"","ar":""}},{"n":396,"t":{"fr":"Fiche produit pour un livre / e-book","en":"","sp":"","ar":""},"p":{"fr":"Page de vente de ton livre [titre] sur une plateforme. Résumé accrocheur, biographie de l'auteur, critiques/avis, extrait. Bons mots-clés de catégorie.","en":"","sp":"","ar":""}},{"n":397,"t":{"fr":"Description pour un produit en précommande","en":"","sp":"","ar":""},"p":{"fr":"Fiche produit pour un article en précommande. Excitation : 'Soyez le premier à l'avoir', pourquoi le produit est spécial, date d'expédition, bonus early-bird.","en":"","sp":"","ar":""}},{"n":398,"t":{"fr":"Fiche produit pour un service de nettoyage/entretien","en":"","sp":"","ar":""},"p":{"fr":"Page de service pour un produit de service. Avant/Après, liste des tâches incluses, zone géographique, assurance, bouton 'Obtenir un devis'.","en":"","sp":"","ar":""}},{"n":399,"t":{"fr":"Liste de fonctionnalités transformée en bénéfices","en":"","sp":"","ar":""},"p":{"fr":"À partir de cette liste de caractéristiques [liste], réécris-les sous forme de bénéfices orientés client. Exemple : 'Batterie 5000 mAh' devient 'Profitez de 2 jours d'autonomie'.","en":"","sp":"","ar":""}},{"n":400,"t":{"fr":"Description de produit pour un objet connecté","en":"","sp":"","ar":""},"p":{"fr":"Explique simplement le fonctionnement et l'intégration du produit [objet connecté] avec les assistants vocaux, l'application mobile, et les scénarios d'usage.","en":"","sp":"","ar":""}},{"n":401,"t":{"fr":"Fiche produit de Noël en édition limitée","en":"","sp":"","ar":""},"p":{"fr":"Fiche pour un produit en édition limitée de Noël. Thème festif, packaging cadeau, rareté ('Seulement 500 pièces'), idée de cadeau pour qui.","en":"","sp":"","ar":""}},{"n":402,"t":{"fr":"Comparaison de deux variantes de produit","en":"","sp":"","ar":""},"p":{"fr":"Sur une même fiche, aide le client à choisir entre la version A et la version B. Tableau comparatif, conseil 'Pour qui ?', avis d'expert.","en":"","sp":"","ar":""}},{"n":403,"t":{"fr":"Fiche produit type 'Guide d'achat' intégré","en":"","sp":"","ar":""},"p":{"fr":"Fiche produit incluant un mini-guide d'achat pour la catégorie (ex: comment choisir la bonne taille de valise). Positionne la marque comme conseil.","en":"","sp":"","ar":""}},{"n":404,"t":{"fr":"Description de produit utilisant l'urgence de la saison","en":"","sp":"","ar":""},"p":{"fr":"Adapte le texte pour la saison en cours : été, rentrée scolaire, etc. Produit : [produit]. Offre saisonnière et arguments liés à la période.","en":"","sp":"","ar":""}},{"n":405,"t":{"fr":"Produit avec preuve sociale intégrée (avis vérifiés)","en":"","sp":"","ar":""},"p":{"fr":"Agrège et mets en forme 5 avis clients positifs dans une section 'Ce que disent nos clients', en respectant les étoiles et le prénom.","en":"","sp":"","ar":""}},{"n":406,"t":{"fr":"Fiche produit pour un article de sport / fitness","en":"","sp":"","ar":""},"p":{"fr":"Texte motivant pour un équipement de sport. Parle de performance, dépassement de soi, confort, et technologie. Conseils d'entraînement.","en":"","sp":"","ar":""}},{"n":407,"t":{"fr":"Description produit avec un focus sur le design et l'esthétique","en":"","sp":"","ar":""},"p":{"fr":"Pour un objet de décoration [objet], mets l'accent sur le style, le matériau, l'inspiration du designer, et comment il s'intègre dans différents intérieurs.","en":"","sp":"","ar":""}},{"n":408,"t":{"fr":"Fiche produit pour un jeu de société / jouet","en":"","sp":"","ar":""},"p":{"fr":"Décris le jeu : principe, nombre de joueurs, durée, âge, compétences développées, et un aperçu d'une partie. Donne envie de s'amuser en famille.","en":"","sp":"","ar":""}},{"n":409,"t":{"fr":"Description pour un article de papeterie premium","en":"","sp":"","ar":""},"p":{"fr":"Vends un carnet/stylo de luxe. Évoque le plaisir de l'écriture, la qualité du papier, le geste, et l'idée de cadeau pour un professionnel.","en":"","sp":"","ar":""}},{"n":410,"t":{"fr":"Fiche produit axée résolution de problème","en":"","sp":"","ar":""},"p":{"fr":"Identifie un problème quotidien précis ([problème]) et présente le produit comme la solution idéale. Structure : 'Vous en avez assez de... ?', présentation, fin du problème.","en":"","sp":"","ar":""}},{"n":411,"t":{"fr":"Script de closing téléphonique pour un service haut de gamme","en":"","sp":"","ar":""},"p":{"fr":"Trame d'un appel de vente de 20 minutes pour conclure une prestation de [service]. Étapes : brise-glace, cadrage, découverte des besoins, présentation/prix, objections, closing.","en":"","sp":"","ar":""}},{"n":412,"t":{"fr":"Script d'appel de suivi après proposition commerciale","en":"","sp":"","ar":""},"p":{"fr":"Script pour un appel de suivi 3 jours après l'envoi d'une proposition. Relance polie, vérification de la réception, demande de feedback, fixation d'une date.","en":"","sp":"","ar":""}},{"n":413,"t":{"fr":"Réponses aux objections de prix (script)","en":"","sp":"","ar":""},"p":{"fr":"5 réponses à l'objection 'C'est trop cher' adaptées à un service [type]. Techniques : entonnoir de prix, fractionnement du coût, comparaison de valeur, ROI.","en":"","sp":"","ar":""}},{"n":414,"t":{"fr":"Script de découverte des besoins pour un commercial B2B","en":"","sp":"","ar":""},"p":{"fr":"10 questions puissantes pour un premier appel découverte avec un prospect dans le secteur [secteur]. Questions ouvertes, sur les conséquences, objectifs, budget.","en":"","sp":"","ar":""}},{"n":415,"t":{"fr":"Script pour vendre une formation par téléphone","en":"","sp":"","ar":""},"p":{"fr":"Trame d'appel de closing pour une formation en ligne. Histoire de succès, explication des modules, remise spéciale 'appel', prise de paiement sécurisée en direct.","en":"","sp":"","ar":""}},{"n":416,"t":{"fr":"Publicité Facebook Ads : Texte principal et titre (PAS)","en":"","sp":"","ar":""},"p":{"fr":"Texte d'une publicité Facebook pour [produit] utilisant la formule Problème-Agitation-Solution. 3 options de titres, 2 options de texte principal. Optimisé mobile.","en":"","sp":"","ar":""}},{"n":417,"t":{"fr":"Script publicitaire vidéo Google Ads (Discovery)","en":"","sp":"","ar":""},"p":{"fr":"Script de 30 secondes pour une annonce vidéo TrueView. 5 premières secondes de hook, corps du message avec bénéfices, CTA à la fin. CTA overlay.","en":"","sp":"","ar":""}},{"n":418,"t":{"fr":"Ensemble de bannières Google Ads (Responsive Search Ads)","en":"","sp":"","ar":""},"p":{"fr":"15 titres (max 30 car.) et 4 descriptions (max 90 car.) pour une campagne RSA ciblant [produit/service]. Mélange bénéfices, offres et features.","en":"","sp":"","ar":""}},{"n":419,"t":{"fr":"Script de publicité radio / podcast","en":"","sp":"","ar":""},"p":{"fr":"Spot audio de 60 secondes pour [produit]. Hook sonore, problème, solution, offre spéciale avec code promo, clôture énergique.","en":"","sp":"","ar":""}},{"n":420,"t":{"fr":"Structure d'une campagne Meta Ads complète (TOFU, MOFU, BOFU)","en":"","sp":"","ar":""},"p":{"fr":"Stratégie de contenu pour 3 ensembles de publicités : TOFU (prospection), MOFU (retargeting), BOFU (conversion). Rédige le copy pour chaque niveau.","en":"","sp":"","ar":""}},{"n":421,"t":{"fr":"Script de vente pour un message direct (DM Instagram)","en":"","sp":"","ar":""},"p":{"fr":"Message type pour contacter un prospect froid via DM Instagram. Mention d'un post récent, compliment, proposition d'aide, suggestion d'appel si intéressé.","en":"","sp":"","ar":""}},{"n":422,"t":{"fr":"Script pour une publicité TikTok Spark Ads","en":"","sp":"","ar":""},"p":{"fr":"Texte d'accroche superposé et script parlé pour une publicité TikTok de 15 secondes qui paraît native. Utilise un langage de créateur.","en":"","sp":"","ar":""}},{"n":423,"t":{"fr":"Trame de vente pour une foire ou salon","en":"","sp":"","ar":""},"p":{"fr":"Script pour aborder un visiteur sur un stand. Accroche, démonstration rapide, prise de contact (carte de visite), suivi à faire.","en":"","sp":"","ar":""}},{"n":424,"t":{"fr":"Publicité Pinterest Ads : titre et description","en":"","sp":"","ar":""},"p":{"fr":"Titre et description pour une épingle sponsorisée promouvant un article de blog / produit [lien]. Mots-clés visuels, CTA 'En savoir plus'.","en":"","sp":"","ar":""}},{"n":425,"t":{"fr":"Script de vente additionnelle (upsell) en face à face","en":"","sp":"","ar":""},"p":{"fr":"Phrase d'upsell naturelle pour un vendeur : 'Avec ceci, je vous recommande aussi... parce que...'. Adapte pour [produit principal] et [upsell].","en":"","sp":"","ar":""}},{"n":426,"t":{"fr":"Accroche pour une publicité native (Taboola/Outbrain)","en":"","sp":"","ar":""},"p":{"fr":"5 titres click-bait (non trompeurs) pour une publicité native renvoyant vers un article sponsorisé sur [sujet]. Respecte les guidelines.","en":"","sp":"","ar":""}},{"n":427,"t":{"fr":"Script de cold call B2B (appel à froid)","en":"","sp":"","ar":""},"p":{"fr":"Script d'appel à froid de 90 secondes pour vendre un [logiciel/service] à un [poste]. Accroche basée sur une actualité, pitch de valeur, prise de rendez-vous.","en":"","sp":"","ar":""}},{"n":428,"t":{"fr":"Réponse aux objections 'Je vais réfléchir'","en":"","sp":"","ar":""},"p":{"fr":"3 scripts pour répondre à 'Je vais réfléchir' lors d'un closing. Questionnement sur les freins, fixation d'une date de suivi, résumé des bénéfices.","en":"","sp":"","ar":""}},{"n":429,"t":{"fr":"Script de vente pour un message vocal WhatsApp","en":"","sp":"","ar":""},"p":{"fr":"Script pour un message vocal de 45 secondes maximum à envoyer via WhatsApp à un prospect chaud. Ton personnel, enthousiaste, contexte, action claire.","en":"","sp":"","ar":""}},{"n":430,"t":{"fr":"Structure pour une landing page de pub Google Ads locale","en":"","sp":"","ar":""},"p":{"fr":"Contenu pour une landing page de service de const catRanges = [[{"start": 1, "end": 40}, {"start": 41, "end": 80}, {"start": 81, "end": 120}, {"start": 121, "end": 150}], [{"start": 151, "end": 190}, {"start": 191, "end": 230}, {"start": 231, "end": 265}, {"start": 266, "end": 300}], [{"start": 301, "end": 340}, {"start": 341, "end": 380}, {"start": 381, "end": 410}, {"start": 411, "end": 450}], [{"start": 451, "end": 475}, {"start": 476, "end": 500}]];

let currentLang = 'fr';
let currentTheme = 'dark';
let currentPillar = -1;
let currentCat = -1;
let searchQuery = '';

function t(key) {
  return ui[currentLang] && ui[currentLang][key] ? ui[currentLang][key] : key;
}

function getPillarNames() {
  const names = [];
  if (langData[currentLang]) {
    for (const p of langData[currentLang].piliers) {
      names.push(p.title);
    }
  }
  return names;
}

function getCatNames(pillarIdx) {
  const names = [];
  if (langData[currentLang]) {
    const pil = langData[currentLang].piliers[pillarIdx];
    if (pil) {
      for (const c of pil.categories) {
        names.push(c.title);
      }
    }
  }
  return names;
}

function getHero() {
  const d = langData[currentLang];
  if (!d) return { title: '', subtitle: '' };
  return { title: d.heroTitle, subtitle: d.heroSubtitle };
}

function getPromptCategory(promptNum) {
  for (let pi = 0; pi < catRanges.length; pi++) {
    for (let ci = 0; ci < catRanges[pi].length; ci++) {
      const r = catRanges[pi][ci];
      if (promptNum >= r.start && promptNum <= r.end) {
        return { pillar: pi, cat: ci };
      }
    }
  }
  return { pillar: 0, cat: 0 };
}

function filterPrompts() {
  return allPrompts.filter(p => {
    if (currentPillar >= 0) {
      const pc = getPromptCategory(p.n);
      if (pc.pillar !== currentPillar) return false;
      if (currentCat >= 0 && pc.cat !== currentCat) return false;
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const titleMatch = (p.t[currentLang] || p.t['fr']).toLowerCase().includes(q);
      const bodyMatch = (p.p[currentLang] || p.p['fr']).toLowerCase().includes(q);
      return titleMatch || bodyMatch;
    }
    return true;
  });
}

function render() {
  // Hero
  const h = getHero();
  document.getElementById('heroTitle').textContent = h.title;
  document.getElementById('heroSubtitle').textContent = h.subtitle;
  document.getElementById('statPrompts').textContent = t('stats_prompts');
  document.getElementById('statPiliers').textContent = t('stats_piliers');
  document.getElementById('statLangues').textContent = t('stats_langues');
  document.getElementById('footerText').textContent = t('footer');
  document.getElementById('searchInput').placeholder = t('search');

  // Language attribute
  const langAttr = currentLang === 'sp' ? 'es' : currentLang;
  document.documentElement.lang = langAttr;
  if (currentLang === 'ar') {
    document.documentElement.dir = 'rtl';
  } else {
    document.documentElement.dir = 'ltr';
  }

  // Pillar tabs
  const pillarNames = getPillarNames();
  const pillarTabs = document.getElementById('pillarTabs');
  const icons = ['💻', '🎨', '💰', '🚀'];
  pillarTabs.innerHTML = '<button class="pillar-tab' + (currentPillar === -1 ? ' active' : '') + '" data-pillar="-1">' + t('all') + '</button>';
  for (let i = 0; i < 4 && i < pillarNames.length; i++) {
    const act = currentPillar === i ? ' active' : '';
    pillarTabs.innerHTML += '<button class="pillar-tab' + act + '" data-pillar="' + i + '">' + icons[i] + ' ' + pillarNames[i] + '</button>';
  }

  // Category filters
  const catFilters = document.getElementById('catFilters');
  catFilters.innerHTML = '';
  if (currentPillar >= 0) {
    const catNames = getCatNames(currentPillar);
    catFilters.innerHTML = '<button class="cat-filter' + (currentCat === -1 ? ' active' : '') + '" data-cat="-1">' + t('all') + '</button>';
    for (let i = 0; i < catNames.length; i++) {
      const act = currentCat === i ? ' active' : '';
      catFilters.innerHTML += '<button class="cat-filter' + act + '" data-cat="' + i + '">' + catNames[i] + '</button>';
    }
  }

  // Prompts
  const filtered = filterPrompts();
  const grid = document.getElementById('promptsGrid');
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">—</div>';
    return;
  }

  let html = '';
  for (const p of filtered) {
    const pc = getPromptCategory(p.n);
    html += '<div class="prompt-card" data-n="' + p.n + '">';
    html += '<div class="prompt-card-header">';
    html += '<span class="prompt-title">' + escapeHtml(p.t[currentLang] || p.t['fr']) + '</span>';
    html += '<span class="prompt-number">#' + p.n + '</span>';
    html += '</div>';
    html += '<div class="prompt-body"><div class="prompt-text">';
    html += '<button class="copy-btn" data-n="' + p.n + '">' + t('copy') + '</button>';
    html += escapeHtml(p.p[currentLang] || p.p['fr']);
    html += '</div></div>';
    html += '</div>';
  }
  grid.innerHTML = html;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// Event listeners
document.getElementById('pillarTabs').addEventListener('click', function(e) {
  const btn = e.target.closest('.pillar-tab');
  if (!btn) return;
  currentPillar = parseInt(btn.dataset.pillar);
  currentCat = -1;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  render();
});

document.getElementById('catFilters').addEventListener('click', function(e) {
  const btn = e.target.closest('.cat-filter');
  if (!btn) return;
  currentCat = parseInt(btn.dataset.cat);
  render();
});

document.getElementById('promptsGrid').addEventListener('click', function(e) {
  const card = e.target.closest('.prompt-card');
  if (!card) return;
  if (e.target.closest('.copy-btn')) return;
  card.classList.toggle('expanded');
});

document.getElementById('promptsGrid').addEventListener('click', function(e) {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const n = parseInt(btn.dataset.n);
  const prompt = allPrompts.find(p => p.n === n);
  if (!prompt) return;
  navigator.clipboard.writeText(prompt.p[currentLang] || prompt.p['fr']).then(() => {
    btn.textContent = t('copied');
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = t('copy');
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = prompt.p[currentLang] || prompt.p['fr'];
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = t('copied');
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = t('copy');
      btn.classList.remove('copied');
    }, 2000);
  });
});

document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  currentPillar = -1;
  currentCat = -1;
  render();
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentLang = this.dataset.lang;
    render();
  });
});

document.getElementById('themeBtn').addEventListener('click', function() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  this.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', currentTheme);
});

// Init
(function init() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  currentTheme = savedTheme;
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
  render();
})();
</script>
