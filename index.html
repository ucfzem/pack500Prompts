<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack 500 Prompts IA Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap&t=20260627" rel="stylesheet">
<style>
:root {
  --font-heading: 'Manrope', system-ui, -apple-system, sans-serif;
  --font-body: 'Manrope', system-ui, -apple-system, sans-serif;
  --font-arabic: 'Noto Naskh Arabic', serif;
  --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
}

[data-theme="dark"] {
  --bg: #120c0a;
  --bg-secondary: #1a1410;
  --bg-card: #231c16;
  --bg-card-hover: #2d241d;
  --text: #f5f0e8;
  --text-secondary: #c4b89e;
  --text-muted: #8a7e6b;
  --gold: #c9a84c;
  --gold-light: #e0c872;
  --gold-dark: #a07828;
  --gold-glow: rgba(201, 168, 76, 0.12);
  --border: #3a3228;
  --border-light: #4a4035;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.4);
  --gradient-gold: linear-gradient(135deg, #c9a84c, #e0c872);
  --gradient-card: linear-gradient(180deg, #231c16 0%, #1e1814 100%);
  --tag-bg: rgba(201, 168, 76, 0.15);
  --tag-text: #d4b96a;
  --separator: rgba(201, 168, 76, 0.2);
  --nav-bg: rgba(18, 12, 10, 0.92);
  --code-bg: #1e1a14;
}

[data-theme="light"] {
  --bg: #f5f0e8;
  --bg-secondary: #faf7f0;
  --bg-card: #ffffff;
  --bg-card-hover: #f8f3e8;
  --text: #2a231c;
  --text-secondary: #5c4e3a;
  --text-muted: #8a7e6b;
  --gold: #a07828;
  --gold-light: #c9a84c;
  --gold-dark: #6b4e1a;
  --gold-glow: rgba(160, 120, 40, 0.1);
  --border: #e0d5c0;
  --border-light: #ede3d0;
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.04);
  --gradient-gold: linear-gradient(135deg, #8b6f47, #c9a84c);
  --gradient-card: linear-gradient(180deg, #ffffff 0%, #faf7f0 100%);
  --tag-bg: rgba(160, 120, 40, 0.12);
  --tag-text: #6b4e1a;
  --separator: rgba(160, 120, 40, 0.2);
  --nav-bg: rgba(245, 240, 232, 0.95);
  --code-bg: #f8f3e8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--border) var(--bg-secondary);
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

/* Navigation */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background var(--transition), border-color var(--transition);
}

.nav-brand {
  font-family: var(--font-heading);
  font-size: 1.15rem;
  font-weight: 700;
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

.nav-controls {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.lang-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 500;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.lang-btn:hover { border-color: var(--gold); color: var(--gold); }
.lang-btn.active {
  background: var(--gold);
  color: #1a1410;
  border-color: var(--gold);
}

.theme-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.25rem 0.5rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.7rem;
  transition: all var(--transition);
  line-height: 1;
}
.theme-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Hero */
.hero {
  padding: 7rem 2rem 3rem;
  text-align: center;
  max-width: 800px;
  margin: 0 auto;
}

.hero h1 {
  font-family: var(--font-heading);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
  line-height: 1.2;
}

.hero p {
  color: var(--text-secondary);
  font-size: 1.1rem;
  margin-bottom: 2rem;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 2.5rem;
}

.stat-item {
  text-align: center;
}

.stat-number {
  font-family: var(--font-heading);
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold);
  display: block;
}

.stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Separator */
.separator {
  width: 60px;
  height: 2px;
  background: var(--gradient-gold);
  margin: 2rem auto;
  border-radius: 1px;
}

/* Pillar Tabs */
.pillar-tabs {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  padding: 0 2rem 1.5rem;
  flex-wrap: wrap;
}

.pillar-tab {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 0.7rem 1.5rem;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  font-family: var(--font-body);
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.pillar-tab:hover { border-color: var(--gold); color: var(--gold); }
.pillar-tab.active {
  background: var(--tag-bg);
  border-color: var(--gold);
  color: var(--gold);
}

/* Search */
.search-wrap {
  max-width: 640px;
  margin: 0 auto 1.5rem;
  padding: 0 2rem;
}

.search-input {
  width: 100%;
  padding: 0.9rem 1.2rem;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.95rem;
  font-family: var(--font-body);
  outline: none;
  transition: all var(--transition);
}
.search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }
.search-input::placeholder { color: var(--text-muted); }

/* Category filter */
.cat-filters {
  display: flex;
  justify-content: center;
  gap: 0.4rem;
  padding: 0 2rem 2rem;
  flex-wrap: wrap;
}

.cat-filter {
  background: none;
  border: 1px solid transparent;
  color: var(--text-muted);
  padding: 0.35rem 0.9rem;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.cat-filter:hover { color: var(--text-secondary); border-color: var(--border); }
.cat-filter.active {
  background: var(--tag-bg);
  color: var(--gold);
  border-color: var(--gold);
}

/* Prompts Grid */
.prompts-section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
}

.prompts-grid {
  display: grid;
  gap: 0.75rem;
}

/* Prompt Card */
.prompt-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.2rem 1.5rem;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.prompt-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); }

.prompt-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}

.prompt-number {
  font-family: var(--font-heading);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--gold);
  white-space: nowrap;
  margin-top: 0.1rem;
  min-width: 2.5rem;
  text-align: right;
}

.prompt-title {
  font-family: var(--font-heading);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}

.prompt-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
  opacity: 0;
  margin-top: 0;
}
.prompt-card.expanded .prompt-body {
  max-height: 600px;
  opacity: 1;
  margin-top: 0.8rem;
}

.prompt-text {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.7;
  padding: 0.8rem 1rem;
  background: var(--code-bg);
  border-radius: 8px;
  border: 1px solid var(--border);
  position: relative;
}

.copy-btn {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 0.3rem 0.7rem;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: var(--font-body);
  transition: all var(--transition);
}
.prompt-card:not(.expanded) .copy-btn { display: none; }
.copy-btn:hover { border-color: var(--gold); color: var(--gold); }
.copy-btn.copied { background: var(--tag-bg); color: var(--gold); border-color: var(--gold); }

.prompt-expand-icon {
  color: var(--text-muted);
  font-size: 0.7rem;
  transition: transform var(--transition);
  margin-left: 0.5rem;
}
.prompt-card.expanded .prompt-expand-icon {
  transform: rotate(180deg);
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
}

/* Arabic RTL */
[lang="ar"] {
  direction: rtl;
  font-family: var(--font-arabic), var(--font-body);
}
[lang="ar"] .nav-brand,
[lang="ar"] h1,
[lang="ar"] .prompt-title,
[lang="ar"] .prompt-number,
[lang="ar"] .prompt-text,
[lang="ar"] .search-input,
[lang="ar"] .stat-label,
[lang="ar"] .stat-value,
[lang="ar"] .copy-btn,
[lang="ar"] .lang-btn {
  font-family: var(--font-arabic), var(--font-body);
}
[lang="ar"] .prompt-card-header {
  flex-direction: row-reverse;
}

/* Responsive */
@media (max-width: 768px) {
  .nav { padding: 0 1rem; height: 60px; }
  .nav-brand { font-size: 1rem; }
  .hero { padding: 5.5rem 1rem 2rem; }
  .stats { gap: 1.5rem; }
  .pillar-tabs { gap: 0.4rem; padding: 0 1rem 1rem; }
  .pillar-tab { padding: 0.5rem 1rem; font-size: 0.8rem; }
  .search-wrap { padding: 0 1rem; }
  .cat-filters { padding: 0 1rem 1.5rem; }
  .prompts-section { padding: 0 1rem 3rem; }
  .prompt-card { padding: 1rem 1.2rem; }
  .prompt-title { font-size: 0.9rem; }
}

@media (max-width: 480px) {
  .pillar-tab { font-size: 0.75rem; padding: 0.4rem 0.8rem; }
  .lang-btn { font-size: 0.7rem; padding: 0.2rem 0.4rem; }
  .stats { gap: 1rem; }
  .stat-number { font-size: 1.5rem; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">✦ 500 Prompts IA</div>
  <div class="nav-controls">
    <button class="lang-btn active" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="sp">SP</button>
    <button class="lang-btn" data-lang="ar">AR</button>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
  </div>
</nav>

<header class="hero">
  <h1 id="heroTitle">Pack de 500 Prompts IA Premium</h1>
  <p id="heroSubtitle">Coder, Créer et Vendre plus vite sur Internet</p>

      <span class="stat-number">4</span>
      <span class="stat-label" id="statPiliers">Piliers</span>

      <span class="stat-number">4</span>

</header>

<div class="pillar-tabs" id="pillarTabs"></div>

<div class="search-wrap">
  <input class="search-input" id="searchInput" type="text" placeholder="Rechercher un prompt..." autocomplete="off">

<div class="cat-filters" id="catFilters"></div>

<section class="prompts-section">
  <div class="prompts-grid" id="promptsGrid"></div>
</section>

<footer class="footer" id="footerText">Pack 500 Prompts IA Premium — Tous droits réservés</footer>

<script>
const allPrompts = [{"n":1,"t":{"fr":"Générer une API REST avec Node.js et Express","en":"Generate a REST API with Node.js and Express","sp":"Generar una API REST con Node.js y Express","ar":"إنشاء API REST باستخدام Node.js و Express"},"p":{"fr":"Crée une API REST avec Node.js et Express pour gérer des [entité]. Inclus les routes CRUD, la validation avec Joi, et une connexion MongoDB. Utilise une architecture MVC. Ajoute un middleware d'erreur générique. Fournis le code complet et expliqué.","en":"Create a REST API with Node.js and Express to manage [entity]. Include CRUD routes, Joi validation, and MongoDB connection. Use MVC architecture. Add a generic error middleware. Provide complete and explained code.","sp":"Crea una API REST con Node.js y Express para gestionar [entidad]. Incluye rutas CRUD, validación con Joi y conexión MongoDB. Usa arquitectura MVC. Agrega middleware de errores genérico. Proporciona el código completo y explicado.","ar":"أنشئ API REST باستخدام Node.js و Express لإدارة [الكيان]. قم بتضمين مسارات CRUD والتحقق من Joi واتصال MongoDB. استخدم بنية MVC. أضف middleware أخطاء عام. قم بتوفير الكود الكامل والمشار إليه."}},{"n":2,"t":{"fr":"Créer un composant React TodoList avec hooks","en":"Create a React TodoList component with hooks","sp":"Crear un componente React TodoList con hooks","ar":"إنشاء مكون React TodoList باستخدام hooks"},"p":{"fr":"Écris un composant React fonctionnel nommé [NomComposant] utilisant les hooks useState et useEffect pour gérer une liste de tâches (ajout, suppression, toggle complétée). Le style doit être fait avec [CSS Modules / Tailwind]. Assure-toi que le code est typé avec TypeScript.","en":"Write a functional React component named [ComponentName] using useState and useEffect hooks to manage a task list (add, delete, toggle completed). Style with [CSS Modules / Tailwind]. Ensure the code is typed with TypeScript.","sp":"Escribe un componente React funcional llamado [NombreComponente] usando hooks useState y useEffect para gestionar una lista de tareas (agregar, eliminar, alternar completada). Estilo con [CSS Modules / Tailwind]. Asegúrate de que el código esté tipado con TypeScript.","ar":"اكتب مكون React وظيفي باسم [اسم المكون] يستخدم hooks useState و useEffect لإدارة قائمة المهام (إضافة، حذف، تبديل مكتمل). النمط باستخدام [CSS Modules / Tailwind]. تأكد من أن الكود مكتوب بـ TypeScript."}},{"n":3,"t":{"fr":"MVP d'un tableau de bord avec Next.js et Prisma","en":"MVP dashboard with Next.js and Prisma","sp":"MVP de panel de control con Next.js y Prisma","ar":"لوحة تحكم MVP باستخدام Next.js و Prisma"},"p":{"fr":"Génère le code initial d'un tableau de bord utilisant Next.js 14 (App Router), Prisma pour la base [PostgreSQL], NextAuth pour l'authentification. Pages : login, dashboard, édition de profil. Utilise Tailwind CSS.","en":"Generate the initial code for a dashboard using Next.js 14 (App Router), Prisma for [PostgreSQL] database, NextAuth for authentication. Pages: login, dashboard, profile editing. Use Tailwind CSS.","sp":"Genera el código inicial de un panel de control usando Next.js 14 (App Router), Prisma para la base de datos [PostgreSQL], NextAuth para autenticación. Páginas: login, panel, edición de perfil. Usa Tailwind CSS.","ar":"قم بإنشاء الكود الأولي للوحة تحكم باستخدام Next.js 14 (App Router) و Prisma لقاعدة بيانات [PostgreSQL] و NextAuth للمصادقة. الصفحات: تسجيل الدخول، لوحة التحكم، تعديل الملف الشخصي. استخدم Tailwind CSS."}},{"n":4,"t":{"fr":"Bot Discord en Python pour modération","en":"Discord bot in Python for moderation","sp":"Bot de Discord en Python para moderación","ar":"بوت Discord بلغة Python للإشراف"},"p":{"fr":"Écris un bot Discord en Python avec discord.py capable de kicker/bannir un membre, supprimer des messages en masse, et envoyer un message de bienvenue personnalisé dans un canal [nom-du-canal].","en":"Write a Discord bot in Python with discord.py capable of kicking/banning a member, bulk deleting messages, and sending a custom welcome message in [chan function getPillarNames() {
  const names = [];
  if (langData[currentLang]) {
    for (const p of langData[currentLang].piliers) {
      names.push(p.title);
    }
  }
  return names;
}

function getCatNames(pillarIdx) {
  const names = [];
  if (langData[currentLang]) {
    const pil = langData[currentLang].piliers[pillarIdx];
    if (pil) {
      for (const c of pil.categories) {
        names.push(c.title);
      }
    }
  }
  return names;
}

function getHero() {
  const d = langData[currentLang];
  if (!d) return { title: '', subtitle: '' };
  return { title: d.heroTitle, subtitle: d.heroSubtitle };
}

function getPromptCategory(promptNum) {
  for (let pi = 0; pi < catRanges.length; pi++) {
    for (let ci = 0; ci < catRanges[pi].length; ci++) {
      const r = catRanges[pi][ci];
      if (promptNum >= r.start && promptNum <= r.end) {
        return { pillar: pi, cat: ci };
      }
    }
  }
  return { pillar: 0, cat: 0 };
}

function filterPrompts() {
  return allPrompts.filter(p => {
    if (currentPillar >= 0) {
      const pc = getPromptCategory(p.n);
      if (pc.pillar !== currentPillar) return false;
      if (currentCat >= 0 && pc.cat !== currentCat) return false;
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const titleMatch = (p.t[currentLang] || p.t['fr']).toLowerCase().includes(q);
      const bodyMatch = (p.p[currentLang] || p.p['fr']).toLowerCase().includes(q);
      return titleMatch || bodyMatch;
    }
    return true;
  });
}

  catFilters.innerHTML = '';
  if (currentPillar >= 0) {
    const catNames = getCatNames(currentPillar);
    catFilters.innerHTML = '<button class="cat-filter' + (currentCat === -1 ? ' active' : '') + '" data-cat="-1">' + t('all') + '</button>';
    for (let i = 0; i < catNames.length; i++) {
      const act = currentCat === i ? ' active' : '';
      catFilters.innerHTML += '<button class="cat-filter' + act + '" data-cat="' + i + '">' + catNames[i] + '</button>';
    }
  }

  // Prompts
  const filtered = filterPrompts();
  const grid = document.getElementById('promptsGrid');
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">—</div>';
    return;
  }

  let html = '';
  for (const p of filtered) {
    const pc = getPromptCategory(p.n);
    html += '<div class="prompt-card" data-n="' + p.n + '">';
    html += '<div class="prompt-card-header">';
    html += '<span class="prompt-title">' + escapeHtml(p.t[currentLang] || p.t['fr']) + '</span>';
    html += '<span class="prompt-number">#' + p.n + '</span>';
    html += '</div>';
    html += '<div class="prompt-body"><div class="prompt-text">';
    html += '<button class="copy-btn" data-n="' + p.n + '">' + t('copy') + '</button>';
    html += escapeHtml(p.p[currentLang] || p.p['fr']);
    html += '</div></div>';
    html += '</div>';
  }
  grid.innerHTML = html;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// Event listeners
document.getElementById('pillarTabs').addEventListener('click', function(e) {
  const btn = e.target.closest('.pillar-tab');
  if (!btn) return;
  currentPillar = parseInt(btn.dataset.pillar);
  currentCat = -1;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  render();
});

document.getElementById('catFilters').addEventListener('click', function(e) {
  const btn = e.target.closest('.cat-filter');
  if (!btn) return;
  currentCat = parseInt(btn.dataset.cat);
  render();
});

document.getElementById('promptsGrid').addEventListener('click', function(e) {
  const card = e.target.closest('.prompt-card');
  if (!card) return;
  if (e.target.closest('.copy-btn')) return;
  card.classList.toggle('expanded');
});

document.getElementById('promptsGrid').addEventListener('click', function(e) {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const n = parseInt(btn.dataset.n);
  const prompt = allPrompts.find(p => p.n === n);
  if (!prompt) return;
  navigator.clipboard.writeText(prompt.p[currentLang] || prompt.p['fr']).then(() => {
    btn.textContent = t('copied');
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = t('copy');
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = prompt.p[currentLang] || prompt.p['fr'];
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = t('copied');
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = t('copy');
      btn.classList.remove('copied');
    }, 2000);
  });
});

document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  currentPillar = -1;
  currentCat = -1;
  render();
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentLang = this.dataset.lang;
    render();
  });
});

document.getElementById('themeBtn').addEventListener('click', function() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  this.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', currentTheme);
});

// Init
(function init() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  currentTheme = savedTheme;
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
  render();
})();
</script>
</body>
</html>
